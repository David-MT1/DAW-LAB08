{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Eliminar Destino - Travello</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="{% static 'styles/bootstrap4/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'styles/main_styles.css' %}">
    <style>
        body { background: #f5f5f5; }
        .confirm-card {
            max-width: 500px; margin: 100px auto; background: white;
            padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .confirm-card h2 { color: #e74c3c; margin-bottom: 20px; }
        .confirm-card p { color: #555; margin-bottom: 30px; }
        .confirm-card img { max-width: 200px; border-radius: 8px; margin-bottom: 20px; }
        .btn-eliminar {
            background: #e74c3c; color: white; border: none;
            padding: 12px 30px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px;
        }
        .btn-eliminar:hover { background: #c0392b; }
        .btn-cancelar {
            background: #95a5a6; color: white; border: none;
            padding: 12px 30px; border-radius: 5px; cursor: pointer; font-size: 16px;
            text-decoration: none;
        }
        .btn-cancelar:hover { background: #7f8c8d; color: white; }
    </style>
</head>
<body>
    <div class="confirm-card">
        <h2>Eliminar destino?</h2>
        {% if dest.img %}
        <img src="{{ dest.img.url }}" alt="{{ dest.name }}">
        {% endif %}
        <p>Estás a punto de eliminar <strong>{{ dest.name }}</strong>. Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-eliminar">Sí, eliminar</button>
            <a href="{% url 'index' %}" class="btn-cancelar">Cancelar</a>
        </form>
    </div>
</body>
</html>
